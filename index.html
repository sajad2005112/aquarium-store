<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر أحواض السمك</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f5f9;
direction:rtl;
}

header{
background:#0d1b2a;
color:white;
padding:20px;
text-align:center;
}

.logo{
font-size:26px;
font-weight:bold;
}

.section{
padding:20px;
}

.categories{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.cat-btn{
background:#0077b6;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.product{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

select, input{
padding:6px;
margin-top:5px;
width:100%;
}

button{
margin-top:10px;
background:#00b4d8;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.about{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">🐠 متجر أحواض السمك</div>
<p>أفضل الأسماك والنباتات ومستلزمات الأحواض</p>
</header>

<div class="section">

<h3>الأقسام</h3>
<div class="categories">
<button class="cat-btn" onclick="showSection('tank')">أحواض</button>
<button class="cat-btn" onclick="showSection('plants')">نباتات</button>
<button class="cat-btn" onclick="showSection('fish')">أسماك</button>
</div>

<div id="products"></div>

<div class="about">
<h3>من نحن</h3>
<p>متجر متخصص ببيع أسماك الزينة والنباتات والأحواض والفلاتر والإنارة وكل مستلزمات الأكواريوم بأفضل جودة.</p>
</div>

</div>

<script>

const whatsappNumber = "9647714433337"; // غير الرقم هنا

function showSection(type){

let container = document.getElementById("products");
container.innerHTML = "";

if(type === "tank"){
container.innerHTML = `
<div class="product">
<h4>حوض زجاجي</h4>

<label>اختر الحجم</label>
<select id="sizeSelect" onchange="updatePrice()">
<option value="25000">40 سم - 25,000</option>
<option value="40000">60 سم - 40,000</option>
<option value="65000">80 سم - 65,000</option>
</select>

<p id="price">السعر: 25,000 دينار</p>

<button onclick="order('حوض زجاجي')">طلب عبر واتساب</button>
</div>
`;
}

if(type === "plants"){
container.innerHTML = `
<div class="product">
<h4>نبات مائي</h4>

<label>الكمية</label>
<input type="number" id="qty" placeholder="ادخل الكمية">

<label>الوحدة</label>
<select id="unit">
<option>غرام</option>
<option>ملغم</option>
<option>كيلو</option>
<option>لتر</option>
<option>سم</option>
</select>

<p>السعر ثابت: 5,000 دينار</p>

<button onclick="orderPlant()">طلب عبر واتساب</button>
</div>
`;
}

if(type === "fish"){
container.innerHTML = `
<div class="product">
<h4>سمك زينة</h4>
<p>السعر: 10,000 دينار</p>
<button onclick="order('سمك زينة')">طلب عبر واتساب</button>
</div>
`;
}

}

function updatePrice(){
let select = document.getElementById("sizeSelect");
let price = select.value;
document.getElementById("price").innerText = "السعر: " + price + " دينار";
}

function order(product){
let message = "مرحبا اريد طلب " + product;
window.open("https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message));
}

function orderPlant(){
let qty = document.getElementById("qty").value;
let unit = document.getElementById("unit").value;

let message = "مرحبا اريد طلب نبات مائي\nالكمية: " + qty + " " + unit;
window.open("https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message));
}

</script>

</body>
</html>
